<html>
  <head>
    <title>Leaderboard</title>
  </head>
  <body>
    <h1>Leaderboard of {{ animal_name }} sightings</h1>

    <table>
      {% for user in username_key_storage[:100] %}
      <tr>
        <td>{{ loop.index }}.</td>
        <td><strong>Count:</strong> {{ username_counts[user] }}</td>
        <td><strong>User:</strong> {{ user }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
